<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERTI Debug Nerve Center</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00d4aa">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#1a1d23;--bg-surface:#22262e;--bg-elevated:#2a2f38;--bg-inset:#15171c;
  --bg-panel:linear-gradient(145deg,#282d36,#1e2229);
  --metal-light:#3a3f4a;--metal-mid:#2e333c;--accent-teal:#00d4aa;--accent-gold:#f0c040;
  --accent-blue:#4a9eff;--accent-red:#ff4757;--accent-green:#2ed573;--accent-purple:#a55eea;--accent-orange:#ff8c42;
  --status-green:#2ed573;--status-yellow:#f0c040;--status-red:#ff4757;--status-blue:#4a9eff;
  --font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --text-primary:#e8eaed;--text-secondary:#9aa0ab;--text-muted:#5f6672;--text-inverse:#1a1d23;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);--shadow-md:0 4px 12px rgba(0,0,0,0.35);--shadow-lg:0 8px 30px rgba(0,0,0,0.4);
  --shadow-inset:inset 0 2px 6px rgba(0,0,0,0.35);--shadow-bevel:inset 0 1px 0 rgba(255,255,255,0.06),inset 0 -1px 0 rgba(0,0,0,0.2);
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(0,212,170,0.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(240,192,64,0.02) 0%,transparent 50%)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-inset);border-radius:4px}::-webkit-scrollbar-thumb{background:var(--metal-light);border-radius:4px}
.header{background:linear-gradient(180deg,#2a2f38,#22262e);border-bottom:1px solid rgba(0,0,0,0.4);box-shadow:0 2px 12px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.05);padding:0 24px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;flex-wrap:wrap;gap:12px}
.header-brand{display:flex;align-items:center;gap:16px}
.header-logo{width:44px;height:44px;background:linear-gradient(135deg,var(--accent-teal),#00a885);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(0,212,170,0.25),inset 0 1px 0 rgba(255,255,255,0.2)}
.header-title{font-family:var(--font-display);font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--text-primary),var(--accent-teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-subtitle{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ww-badge{background:var(--bg-inset);border:1px solid rgba(0,212,170,0.2);border-radius:8px;padding:6px 14px;font-family:var(--font-mono);font-size:13px;color:var(--accent-teal);box-shadow:var(--shadow-inset)}
.btn-icon{background:linear-gradient(145deg,#333842,#282d36);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 14px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-sm),var(--shadow-bevel);transition:all 0.2s;white-space:nowrap}
.btn-icon:hover{background:linear-gradient(145deg,#3a4048,#2e333c);border-color:rgba(0,212,170,0.3)}
.live-dot{width:8px;height:8px;background:var(--accent-green);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 8px rgba(46,213,115,0.4)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}
.tab-nav{display:flex;gap:2px;overflow-x:auto}
.tab-btn{padding:10px 18px;background:transparent;border:none;color:var(--text-muted);font-family:var(--font-body);font-size:12.5px;font-weight:500;cursor:pointer;position:relative;transition:all 0.25s;white-space:nowrap;border-radius:8px 8px 0 0}
.tab-btn:hover{color:var(--text-secondary);background:rgba(255,255,255,0.03)}
.tab-btn.active{color:var(--accent-teal);background:linear-gradient(180deg,rgba(0,212,170,0.08),transparent)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent-teal);border-radius:2px 2px 0 0;box-shadow:0 0 10px rgba(0,212,170,0.4)}
.main{padding:24px;max-width:1600px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.panel{background:var(--bg-panel);border:1px solid rgba(255,255,255,0.04);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-md),var(--shadow-bevel);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)}
.panel-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-teal);box-shadow:0 0 6px rgba(0,212,170,0.4)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:linear-gradient(145deg,#2e333c,#252930);border:1px solid rgba(255,255,255,0.04);border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow-md),var(--shadow-bevel);position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg),var(--shadow-bevel)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:0 2px 2px 0}
.kpi-card.green::after{background:var(--status-green);box-shadow:0 0 12px rgba(46,213,115,0.3)}
.kpi-card.yellow::after{background:var(--status-yellow);box-shadow:0 0 12px rgba(240,192,64,0.3)}
.kpi-card.red::after{background:var(--status-red);box-shadow:0 0 12px rgba(255,71,87,0.3)}
.kpi-card.blue::after{background:var(--status-blue);box-shadow:0 0 12px rgba(74,158,255,0.3)}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:8px}
.kpi-value{font-family:var(--font-mono);font-size:32px;font-weight:600;color:var(--text-primary);line-height:1;margin-bottom:6px}
.kpi-sub{font-size:12px;color:var(--text-secondary)}
.kpi-change{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:12px;padding:2px 8px;border-radius:6px;margin-left:4px}
.kpi-change.up{color:var(--status-green);background:rgba(46,213,115,0.1)}.kpi-change.down{color:var(--status-red);background:rgba(255,71,87,0.1)}
.inset{background:var(--bg-inset);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-inset);border:1px solid rgba(0,0,0,0.2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
@media(max-width:1024px){.grid-2,.grid-3,.grid-2-1{grid-template-columns:1fr}}
.chart-wrap{position:relative;height:300px;margin-top:8px}.chart-wrap canvas{max-height:100%}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:var(--radius-md);margin-bottom:8px;border-left:3px solid;background:rgba(0,0,0,0.15)}
.alert-item.critical{border-color:var(--status-red);background:rgba(255,71,87,0.06)}
.alert-item.warning{border-color:var(--status-yellow);background:rgba(240,192,64,0.06)}
.alert-item.info{border-color:var(--status-blue);background:rgba(74,158,255,0.06)}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}.alert-text{font-size:13px;color:var(--text-secondary);line-height:1.5}.alert-text strong{color:var(--text-primary)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.badge.green{background:rgba(46,213,115,0.12);color:var(--status-green)}.badge.yellow{background:rgba(240,192,64,0.12);color:var(--status-yellow)}
.badge.red{background:rgba(255,71,87,0.12);color:var(--status-red)}.badge.blue{background:rgba(74,158,255,0.12);color:var(--status-blue)}.badge.purple{background:rgba(165,94,234,0.12);color:var(--accent-purple)}
.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.data-table thead th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06);text-align:left;position:sticky;top:0;background:var(--bg-inset);z-index:1}
.data-table tbody td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-secondary);vertical-align:middle}
.data-table tbody tr:hover td{background:rgba(0,212,170,0.04);color:var(--text-primary)}.data-table .mono{font-family:var(--font-mono);font-size:12px}
.hm-cell{display:inline-flex;align-items:center;justify-content:center;width:32px;height:28px;border-radius:4px;font-family:var(--font-mono);font-size:11px;font-weight:600}
.hm-cell.l1{background:rgba(255,71,87,0.2);color:#ff6b7a}.hm-cell.l2{background:rgba(240,192,64,0.2);color:#f0c040}.hm-cell.l3{background:rgba(46,213,115,0.2);color:#2ed573}
.shift-cell{display:inline-flex;align-items:center;justify-content:center;width:36px;height:26px;border-radius:4px;font-family:var(--font-mono);font-size:10px;font-weight:600}
.shift-cell.ds{background:rgba(46,213,115,0.15);color:#2ed573}.shift-cell.ns{background:rgba(74,158,255,0.15);color:#4a9eff}
.shift-cell.nt{background:rgba(240,192,64,0.15);color:#f0c040}.shift-cell.vl{background:rgba(165,94,234,0.15);color:#a55eea}
.shift-cell.off{background:rgba(255,255,255,0.03);color:var(--text-muted)}
.team-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.edit-input{background:var(--bg-inset);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 10px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;width:100%;outline:none;transition:border-color 0.2s}
.edit-input:focus{border-color:var(--accent-teal);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
.edit-select{background:var(--bg-inset);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 10px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;cursor:pointer}
.inline-select{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 6px;color:var(--text-secondary);font-family:var(--font-body);font-size:12px;cursor:pointer;outline:none;transition:all 0.2s;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6' fill='%235f6672'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 6px center;padding-right:20px}
.inline-select:hover{border-color:rgba(255,255,255,0.15);background-color:var(--bg-inset)}
.inline-select:focus{border-color:var(--accent-teal);background-color:var(--bg-inset)}
.btn{padding:8px 18px;border-radius:8px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(145deg,var(--accent-teal),#00b894);color:var(--text-inverse);box-shadow:0 4px 12px rgba(0,212,170,0.25)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(0,212,170,0.35);transform:translateY(-1px)}
.btn-danger{background:linear-gradient(145deg,#ff4757,#e04050);color:#fff}.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text-secondary);border:1px solid rgba(255,255,255,0.08)}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text-primary)}.btn-sm{padding:5px 12px;font-size:12px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-elevated);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-xl);padding:28px;width:90%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--font-display);font-size:20px;margin-bottom:20px;color:var(--text-primary)}
.form-group{margin-bottom:16px}.form-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px;font-weight:600}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 12px;color:var(--text-secondary);cursor:pointer;font-size:14px;transition:all 0.2s}
.cal-nav-btn:hover{background:rgba(0,212,170,0.1);border-color:var(--accent-teal);color:var(--accent-teal)}
.cal-title{font-family:var(--font-display);font-size:18px;font-weight:700;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:180px repeat(7,1fr);gap:1px;background:rgba(255,255,255,0.02);border-radius:var(--radius-md);overflow:hidden}
.cal-header-cell{background:var(--bg-elevated);padding:10px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;text-align:center}
.cal-header-cell:first-child{text-align:left;padding-left:14px}
.cal-name-cell{background:var(--bg-surface);padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;min-height:38px;border-bottom:1px solid rgba(255,255,255,0.02)}
.cal-day-cell{background:var(--bg-surface);padding:4px;text-align:center;min-height:38px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(255,255,255,0.02);transition:background 0.15s}
.cal-day-cell:hover{background:var(--bg-elevated)}.cal-day-cell.today{background:rgba(0,212,170,0.06)}
.cal-team-row{grid-column:1/-1;background:rgba(0,0,0,0.2);padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:8px}
.cal-date-sub{font-size:9px;color:var(--text-muted);display:block;margin-top:1px}
.date-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.date-toolbar input[type="date"]{background:var(--bg-inset);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 14px;color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:none;color-scheme:dark}
.preset-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:var(--text-secondary);transition:all 0.2s}
.preset-btn:hover,.preset-btn.active{background:var(--accent-teal);color:var(--text-inverse);border-color:var(--accent-teal)}
.upload-zone{border:2px dashed rgba(0,212,170,0.2);border-radius:var(--radius-lg);padding:50px 40px;text-align:center;cursor:pointer;transition:all 0.3s;background:rgba(0,212,170,0.02)}
.upload-zone:hover{border-color:var(--accent-teal);background:rgba(0,212,170,0.05)}
.upload-zone.dragover{border-color:var(--accent-teal);background:rgba(0,212,170,0.08);box-shadow:0 0 30px rgba(0,212,170,0.1)}
.upload-zone .icon{font-size:48px;margin-bottom:12px;opacity:0.7}.upload-zone h4{font-size:16px;margin-bottom:6px}.upload-zone p{font-size:13px;color:var(--text-muted)}
.import-log{max-height:300px;overflow-y:auto}
.log-entry{padding:10px 14px;border-radius:8px;margin-bottom:6px;font-size:12px;display:flex;align-items:center;gap:10px}
.log-entry.success{background:rgba(46,213,115,0.08);color:var(--status-green)}.log-entry.error{background:rgba(255,71,87,0.08);color:var(--status-red)}.log-entry.info{background:rgba(74,158,255,0.08);color:var(--status-blue)}
.config-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}.config-label{font-size:12px;color:var(--text-muted);min-width:120px;font-weight:600}
.config-val{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);flex:1}
.conn-dot{width:8px;height:8px;border-radius:50%}.conn-dot.on{background:var(--accent-green);box-shadow:0 0 6px rgba(46,213,115,0.5)}.conn-dot.off{background:var(--accent-red);box-shadow:0 0 6px rgba(255,71,87,0.3)}
.rag-card{padding:14px 18px;border-radius:var(--radius-md);display:flex;align-items:center;gap:12px;margin-bottom:8px;background:rgba(0,0,0,0.15);border-left:3px solid}
.section-gap{margin-bottom:20px}
@media(max-width:768px){.main{padding:16px}.kpi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div class="header-brand"><div class="header-logo">&#x1f52c;</div><div><div class="header-title">ERTI Debug Nerve Center</div><div class="header-subtitle">HW Debug Operations &middot; Analog Devices</div></div></div>
    <div class="header-actions"><div class="live-dot" id="connDot"></div><div class="ww-badge" id="wwBadge">WW2620</div><button class="btn-icon" onclick="openConfigModal()">&#x2699;&#xfe0f; Settings</button></div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="executive">Executive Pulse</button>
    <button class="tab-btn" data-tab="revenue">Revenue Deep Dive</button>
    <button class="tab-btn" data-tab="output">Output &amp; Productivity</button>
    <button class="tab-btn" data-tab="manpower">Manpower &amp; Schedule</button>
    <button class="tab-btn" data-tab="skills">Skills &amp; Competency</button>
    <button class="tab-btn" data-tab="people">People &amp; Attrition</button>
    <button class="tab-btn" data-tab="import">&#x1f4e5; Import Data</button>
  </nav>
</header>
<main class="main">
  <div class="tab-content active" id="tab-executive"></div>
  <div class="tab-content" id="tab-revenue"></div>
  <div class="tab-content" id="tab-output"></div>
  <div class="tab-content" id="tab-manpower"></div>
  <div class="tab-content" id="tab-skills"></div>
  <div class="tab-content" id="tab-people"></div>
  <div class="tab-content" id="tab-import"></div>
</main>
<div class="modal-overlay" id="employeeModal"><div class="modal"><h3 id="modalTitle">Add Engineer</h3>
  <div class="form-group"><label>Full Name</label><input class="edit-input" id="empName" placeholder="e.g., Dela Cruz, Juan"></div>
  <div class="form-group"><label>Team</label><select class="edit-select" id="empTeam" style="width:100%"></select></div>
  <div class="form-group"><label>Role</label><select class="edit-select" id="empRole" style="width:100%"></select></div>
  <div class="grid-2"><div class="form-group"><label>Competency</label><select class="edit-select" id="empComp" style="width:100%"><option value="1">1 Novice</option><option value="2">2 Competent</option><option value="3">3 Expert</option></select></div>
  <div class="form-group"><label>Flexibility</label><select class="edit-select" id="empFlex" style="width:100%"><option value="1">1 Single</option><option value="2">2 Multi</option></select></div></div>
  <div class="form-group"><label>Status</label><select class="edit-select" id="empStatus" style="width:100%"><option value="Active">Active</option><option value="Training">Training</option><option value="On Leave">On Leave</option><option value="Separated">Separated</option></select></div>

e.flexibility>=2?'l3':'l1')+'">'+e.flexibility+'</span></td><td><select class="inline-select" onchange="iEdit('+e.id+',\'status\',this.value)">'+STATUSES.map(s=>'<option value="'+s+'"'+(e.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></td><td class="mono" style="text-align:right">'+(rv>0?peso(rv):'\u2014')+'</td><td style="white-space:nowrap"><button class="btn btn-sm btn-ghost" onclick="openEdit('+e.id+')">&#x270f;&#xfe0f;</button><button class="btn btn-sm btn-ghost" onclick="delEng('+e.id+')" style="color:var(--accent-red)">\u2715</button></td></tr>'}).join('')+'</tbody></table></div></div>';

function renderImport(){const el=document.getElementById('tab-import');
el.innerHTML='<div class="grid-2-1 section-gap"><div class="panel"><div class="panel-title"><span class="dot"></span>Data Import</div><div class="upload-zone" id="dropZone" onclick="document.getElementById(\'importFile\').click()"><div class="icon">\ud83d\udcc2</div><h4>Drop Excel/CSV here or click</h4><p>Auto-detects schedule, revenue, output, roster sheets</p></div><input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleImport(this.files[0])"><div style="margin-top:20px"><div class="panel-title"><span class="dot"></span>Auto-Detect Patterns</div><div class="inset"><table class="data-table"><thead><tr><th>Sheet</th><th>Domain</th><th>Columns</th></tr></thead><tbody><tr><td><strong>DEBUG SCHEDULE</strong></td><td><span class="badge blue">Manpower</span></td><td>Name, DS/NS/NT/VL codes</td></tr><tr><td><strong>Individual Revenue</strong></td><td><span class="badge green">Revenue</span></td><td>Engineer, peso amounts</td></tr><tr><td><strong>*BBS</strong></td><td><span class="badge yellow">Output</span></td><td>WW, units, revenue</td></tr><tr><td><strong>SCORE CARD*</strong></td><td><span class="badge purple">Scorecard</span></td><td>PTS, attendance, comp</td></tr><tr><td><strong>HC_ATTRITION</strong></td><td><span class="badge red">People</span></td><td>Period, HC, separations</td></tr></tbody></table></div></div></div><div class="panel"><div class="panel-title"><span class="dot"></span>Import Log</div><div class="import-log" id="importLog">'+(importLog.length===0?'<div style="text-align:center;padding:40px 20px;color:var(--text-muted)"><div style="font-size:36px;margin-bottom:8px;opacity:0.5">\ud83d\udccb</div><p>No imports yet.</p></div>':importLog.map(l=>'<div class="log-entry '+l.type+'"><span>'+(l.type==='success'?'\u2705':l.type==='error'?'\u274c':'\u2139\ufe0f')+'</span><div><strong>'+l.title+'</strong><br><span style="font-size:11px;opacity:0.8">'+l.msg+'</span></div><span style="margin-left:auto;font-size:10px;color:var(--text-muted)">'+l.time+'</span></div>').join(''))+'</div></div></div>';
el.innerHTML+='<div class="panel section-gap"><div class="panel-title"><span class="dot"></span>Sync</div><div class="grid-3"><div class="inset" style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Engineers</div><div style="font-family:var(--font-mono);font-size:24px;font-weight:600">'+engineers.length+'</div><button class="btn btn-sm btn-primary" style="margin-top:12px" onclick="pushSupa(\'engineers\')">Push Supabase</button></div><div class="inset" style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Schedule</div><div style="font-family:var(--font-mono);font-size:24px;font-weight:600">'+Object.keys(scheduleStore).length+'</div><button class="btn btn-sm btn-primary" style="margin-top:12px" onclick="pushSupa(\'schedule\')">Push Supabase</button></div><div class="inset" style="text-align:center;padding:20px"><div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">GitHub</div><div style="font-family:var(--font-mono);font-size:24px;font-weight:600">\u2014</div><button class="btn btn-sm btn-ghost" style="margin-top:12px" onclick="ghBackup()">Backup</button></div></div></div>';
const dz=document.getElementById('dropZone');if(dz){dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files.length)handleImport(e.dataTransfer.files[0])})}}
function addLog(type,title,msg){importLog.unshift({type,title,msg,time:new Date().toLocaleTimeString()});if(importLog.length>50)importLog.pop()}
function handleImport(file){if(!file)return;addLog('info','File',file.name+' ('+Math.round(file.size/1024)+'KB)');const r=new FileReader();r.onload=function(e){try{const d=new Uint8Array(e.target.result),wb=XLSX.read(d,{type:'array'});addLog('success','Parsed',wb.SheetNames.length+' sheets: '+wb.SheetNames.join(', '));wb.SheetNames.forEach(n=>{const l=n.toLowerCase();if(l.includes('schedule'))addLog('success','Schedule','Sheet "'+n+'" detected');else if(l.includes('revenue'))addLog('success','Revenue','Sheet "'+n+'" detected');else if(l.includes('score'))addLog('info','Scorecard','Sheet "'+n+'" detected');else if(l.includes('hc')||l.includes('attrition'))addLog('info','HC','Sheet "'+n+'" detected');else if(l.includes('bbs')||l.includes('output'))addLog('info','Output','Sheet "'+n+'" detected');else addLog('info','Unknown','Sheet "'+n+'"')});renderImport();refreshAll()}catch(er){addLog('error','Parse Error',er.message);renderImport()}};r.readAsArrayBuffer(file)}
async function pushSupa(t){if(!supabase)return alert('Connect Supabase first.');addLog('info','Sync','Pushing '+t+'...');renderImport()}
function ghBackup(){if(!ghConfig.repo)return alert('Config GitHub first.');addLog('info','GitHub','Preparing backup...');renderImport()}

function saveEng(){const n=document.getElementById('empName').value.trim();if(!n)return alert('Name required.');const d={name:n,team:document.getElementById('empTeam').value,role:document.getElementById('empRole').value,competency:parseInt(document.getElementById('empComp').value),flexibility:parseInt(document.getElementById('empFlex').value),status:document.getElementById('empStatus').value};if(editingId!==null){const e=engineers.find(x=>x.id===editingId);if(e)Object.assign(e,d)}else{engineers.push({id:nextId++,...d,revenue:{apr:0,may:0,jun:0}})}closeModal('employeeModal');refreshAll()}
