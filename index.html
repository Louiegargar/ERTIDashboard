<style>
:root{--bg-base:#1a1d23;--bg-surface:#22262e;--bg-elevated:#2a2f38;--bg-inset:#15171c;--bg-panel:linear-gradient(145deg,#282d36,#1e2229);--metal-light:#3a3f4a;--accent-teal:#00d4aa;--accent-gold:#f0c040;--accent-blue:#4a9eff;--accent-red:#ff4757;--accent-green:#2ed573;--accent-purple:#a55eea;--status-green:#2ed573;--status-yellow:#f0c040;--status-red:#ff4757;--status-blue:#4a9eff;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;--text-primary:#e8eaed;--text-secondary:#9aa0ab;--text-muted:#5f6672;--text-inverse:#1a1d23;--shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 8px 30px rgba(0,0,0,.4);--shadow-inset:inset 0 2px 6px rgba(0,0,0,.35);--shadow-bevel:inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 0 rgba(0,0,0,.2);--radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--sidebar-w:220px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-inset);border-radius:4px}::-webkit-scrollbar-thumb{background:var(--metal-light);border-radius:4px}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#22262e,#1a1d23);border-right:1px solid rgba(255,255,255,.04);z-index:100;display:flex;flex-direction:column;box-shadow:2px 0 20px rgba(0,0,0,.3)}
.sidebar-brand{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.sidebar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent-teal),#00a885);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(0,212,170,.25);margin-bottom:10px}
.sidebar-title{font-family:var(--font-display);font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--text-primary),var(--accent-teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-sub{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{color:var(--text-secondary);background:rgba(255,255,255,.03)}.nav-item.active{color:var(--accent-teal);background:rgba(0,212,170,.08);border-color:rgba(0,212,170,.12)}
.nav-item .icon{width:20px;text-align:center;font-size:15px}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.04)}
.ww-badge{background:var(--bg-inset);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:6px 12px;font-family:var(--font-mono);font-size:12px;color:var(--accent-teal);text-align:center;display:block}
.conn-ind{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);margin-top:8px}.conn-ind .d{width:6px;height:6px;border-radius:50%}.conn-ind .d.on{background:var(--accent-green)}.conn-ind .d.off{background:var(--accent-red)}
.main{margin-left:var(--sidebar-w);padding:24px 28px;min-height:100vh}.tab-content{display:none}.tab-content.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.page-header{margin-bottom:24px}.page-header h1{font-family:var(--font-display);font-size:24px;font-weight:700}.page-header p{font-size:13px;color:var(--text-muted);margin-top:4px}
.panel{background:var(--bg-panel);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-md),var(--shadow-bevel);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.pt{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.pt .dot{width:6px;height:6px;border-radius:50%;background:var(--accent-teal);box-shadow:0 0 6px rgba(0,212,170,.4)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:linear-gradient(145deg,#2e333c,#252930);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-lg);padding:16px 20px;position:relative;overflow:hidden;transition:transform .2s}
.kpi-card:hover{transform:translateY(-2px)}.kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:0 2px 2px 0}
.kpi-card.green::after{background:var(--status-green)}.kpi-card.yellow::after{background:var(--status-yellow)}.kpi-card.red::after{background:var(--status-red)}.kpi-card.blue::after{background:var(--status-blue)}.kpi-card.teal::after{background:var(--accent-teal)}
.kl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:4px}
.kv{font-family:var(--font-mono);font-size:24px;font-weight:600;line-height:1;margin-bottom:3px}.ks{font-size:11px;color:var(--text-secondary)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

.chart-wrap{position:relative;height:280px;margin-top:8px}.chart-wrap canvas{max-height:100%}
.dt{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.dt thead th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;position:sticky;top:0;background:var(--bg-inset);z-index:1}
.dt tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text-secondary);vertical-align:middle}
.dt tbody tr:hover td{background:rgba(0,212,170,.04)}.mono{font-family:var(--font-mono);font-size:12px}
.team-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase}.badge.green{background:rgba(46,213,115,.12);color:var(--status-green)}.badge.yellow{background:rgba(240,192,64,.12);color:var(--status-yellow)}.badge.red{background:rgba(255,71,87,.12);color:var(--status-red)}.badge.blue{background:rgba(74,158,255,.12);color:var(--status-blue)}
.ei{background:var(--bg-inset);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;width:100%;outline:0}.ei:focus{border-color:var(--accent-teal)}
.es{background:var(--bg-inset);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px 10px;color:var(--text-primary);font-size:13px;outline:0;cursor:pointer}
.is{background:0 0;border:1px solid transparent;border-radius:4px;padding:3px 5px;color:var(--text-secondary);font-size:12px;cursor:pointer;outline:0}.is:hover{border-color:rgba(255,255,255,.15);background:var(--bg-inset)}
.btn{padding:8px 18px;border-radius:8px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(145deg,var(--accent-teal),#00b894);color:var(--text-inverse);box-shadow:0 4px 12px rgba(0,212,170,.25)}.btn-primary:hover{transform:translateY(-1px)}
.btn-save{background:linear-gradient(145deg,#4a9eff,#3a8eef);color:#fff;box-shadow:0 4px 12px rgba(74,158,255,.25)}.btn-save:hover{transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text-secondary);border:1px solid rgba(255,255,255,.08)}.btn-ghost:hover{background:rgba(255,255,255,.08)}.btn-sm{padding:5px 12px;font-size:12px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}.modal-overlay.open{display:flex}
.modal{background:var(--bg-elevated);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-xl);padding:28px;width:90%;max-width:560px;box-shadow:0 24px 60px rgba(0,0,0,.5);max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--font-display);font-size:20px;margin-bottom:20px}.fg{margin-bottom:14px}.fg label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:5px;font-weight:600}
.section-gap{margin-bottom:20px}
.sql-box{background:var(--bg-inset);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:14px;font-family:var(--font-mono);font-size:11px;color:var(--accent-teal);max-height:250px;overflow:auto;white-space:pre;line-height:1.5}
.cal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}.cal-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 10px;color:var(--text-secondary);cursor:pointer;font-size:13px}.cal-btn:hover{background:rgba(0,212,170,.1);color:var(--accent-teal)}
.cal-title{font-family:var(--font-display);font-size:16px;font-weight:700;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:140px repeat(7,1fr);gap:1px;background:rgba(255,255,255,.02);border-radius:var(--radius-md);overflow:hidden}
.ch{background:var(--bg-elevated);padding:8px 6px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;text-align:center}.ch:first-child{text-align:left;padding-left:10px}
.cn{background:var(--bg-surface);padding:4px 10px;font-size:11px;font-weight:500;min-height:32px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.02)}
.cd{background:var(--bg-surface);padding:2px;text-align:center;min-height:32px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(255,255,255,.02)}.cd.today{background:rgba(0,212,170,.06)}
.cd select{background:var(--bg-inset);border:1px solid transparent;border-radius:4px;color:var(--text-secondary);font-family:var(--font-mono);font-size:10px;padding:3px 2px;width:38px;text-align:center;outline:0;cursor:pointer;-webkit-appearance:none}.cd select:hover{border-color:rgba(255,255,255,.15)}
.cd select.ds{color:#2ed573}.cd select.ns{color:#4a9eff}.cd select.vl{color:#a55eea}.cd select.nt{color:#f0c040}.cd select.rd{color:#ff8c42}
.ct-row{grid-column:1/-1;background:rgba(0,0,0,.2);padding:6px 10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px}
.mc{background:var(--bg-inset);border-radius:var(--radius-md);padding:12px;text-align:center}.mv{font-family:var(--font-mono);font-size:18px;font-weight:700;margin:4px 0}.ml{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.mi{width:48px;text-align:center;background:var(--bg-base);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:3px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;outline:0}
.sb{height:5px;background:var(--bg-inset);border-radius:3px;overflow:hidden}.sf{height:100%;border-radius:3px}
.bi{width:120px;background:var(--bg-inset);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:0;text-align:right}.bi:focus{border-color:var(--accent-teal)}
.oi{width:55px;background:var(--bg-inset);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:3px 5px;color:var(--text-primary);font-family:var(--font-mono);font-size:11px;text-align:center;outline:0}.oi:focus{border-color:var(--accent-teal)}
.os{background:var(--bg-inset);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:3px;color:var(--text-secondary);font-size:10px;outline:0;cursor:pointer;max-width:65px}
.preset-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--text-secondary);transition:all .2s}.preset-btn:hover,.preset-btn.active{background:var(--accent-teal);color:var(--text-inverse);border-color:var(--accent-teal)}
.upload-zone{border:2px dashed rgba(0,212,170,.2);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;background:rgba(0,212,170,.02)}.upload-zone:hover{border-color:var(--accent-teal)}.upload-zone .icon{font-size:40px;margin-bottom:8px;opacity:.7}.upload-zone h4{font-size:15px;margin-bottom:4px}.upload-zone p{font-size:12px;color:var(--text-muted)}
.log-entry{padding:6px 10px;border-radius:6px;margin-bottom:3px;font-size:12px;display:flex;align-items:center;gap:6px}.log-entry.success{background:rgba(46,213,115,.08);color:var(--status-green)}.log-entry.info{background:rgba(74,158,255,.08);color:var(--status-blue)}.log-entry.error{background:rgba(255,71,87,.08);color:var(--status-red)}
.hm{display:inline-flex;align-items:center;justify-content:center;width:30px;height:26px;border-radius:4px;font-family:var(--font-mono);font-size:11px;font-weight:600}.hm.l0{background:rgba(255,255,255,.05);color:var(--text-muted)}.hm.l1{background:rgba(255,71,87,.2);color:#ff6b7a}.hm.l2{background:rgba(240,192,64,.2);color:#f0c040}.hm.l3{background:rgba(46,213,115,.2);color:#2ed573}
.vb{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);border-radius:6px;padding:4px 10px;color:var(--accent-teal);font-size:11px;font-weight:600;cursor:pointer}.vb:hover{background:rgba(0,212,170,.2)}
.rs{width:45px;text-align:center;background:var(--bg-inset);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:3px;color:var(--text-primary);font-family:var(--font-mono);font-size:12px;outline:0;cursor:pointer}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-elevated);border:1px solid rgba(0,212,170,.2);border-radius:10px;padding:12px 20px;color:var(--accent-teal);font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:999;display:none}
.config-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}.config-label{font-size:12px;color:var(--text-muted);min-width:110px;font-weight:600}.config-val{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);flex:1}
.conn-dot{width:8px;height:8px;border-radius:50%}.conn-dot.on{background:var(--accent-green)}.conn-dot.off{background:var(--accent-red)}
.rag-card{padding:10px 14px;border-radius:var(--radius-md);display:flex;align-items:center;gap:10px;margin-bottom:5px;background:rgba(0,0,0,.15);border-left:3px solid}
.price-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
@media(max-width:768px){.sidebar{width:60px}.sidebar-title,.sidebar-sub,.nav-item span:not(.icon){display:none}.main{margin-left:60px;padding:16px}}
</style>
</head>

<!-- Employee Modal -->

<div class="grid-2"><div class="fg"><label>Last Name</label><input class="ei" id="emL"></div><div class="fg"><label>First Name</label><input class="ei" id="emF"></div></div>

<div class="grid-2"><div class="fg"><label>Team</label><select class="es" id="emT" style="width:100%"></select></div><div class="fg"><label>Hired</label><input class="ei" id="emH" type="date"></div></div>

<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px"><button class="btn btn-ghost" onclick="closeM('empModal')">Cancel</button><button class="btn btn-primary" onclick="saveEmp()">Save</button></div>

<h3 id="spN">-</h3><p id="spM" style="font-size:12px;color:var(--text-muted);margin-bottom:16px"></p>

<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px"><button class="btn btn-ghost" onclick="closeM('skillPop')">Close</button><button class="btn btn-primary" onclick="saveSR()">Save</button></div>
</div></div>
<script>
"use strict";
var TK=['F1-LEGACY','F1-PC','F2-LTX','F2-ETS','F2-ETS/LTX','F3-FT','F3-PC'];
var TM={'F1-LEGACY':{c:'#3B82F6',l:'F1-Legacy'},'F1-PC':{c:'#10B981',l:'F1-PC'},'F2-LTX':{c:'#F59E0B',l:'F2-LTX'},'F2-ETS':{c:'#F97316',l:'F2-ETS'},'F2-ETS/LTX':{c:'#EF4444',l:'F2-ETS/LTX'},'F3-FT':{c:'#8B5CF6',l:'F3-FT'},'F3-PC':{c:'#06B6D4',l:'F3-PC'}};
var ROLES=['Engineer1','Engineer2','Technician3'];
var PLAT=['CTS','FLEX','NI','AERO','EAGLE ETS','LTX'];
